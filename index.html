<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVince</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E293B;
            --accent: #3B82F6;
            --bg: #F1F5F9;
            --text-main: #334155;
            --border-radius: 8px;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); padding: 40px 20px; display: flex; justify-content: center; margin: 0; color: var(--text-main); }
        
        .builder-card { 
            background: #ffffff; 
            padding: 45px; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(30, 41, 59, 0.08); 
            width: 100%; 
            max-width: 850px; 
            border-top: 8px solid var(--accent); 
        }
        
        h2 { text-align: center; color: var(--primary); margin-bottom: 35px; font-weight: 800; font-size: 2.2rem; letter-spacing: -0.5px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .input-group { margin-bottom: 24px; }
        
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #E2E8F0; 
            border-radius: var(--border-radius); 
            font-size: 1rem; 
            background: #F8FAFC;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus { 
            border-color: var(--accent); 
            outline: none; 
            background: #ffffff; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
        }
        
        .img-upload-container { display: flex; align-items: center; gap: 15px; }
        #imagePreview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: none; border: 2px solid var(--accent); }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent); 
            color: #ffffff; 
            border: none; 
            border-radius: var(--border-radius); 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: all 0.3s ease; 
        }
        button:hover { background: #2563EB; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        
        hr { border: 0; border-top: 2px dashed #E2E8F0; margin: 35px 0; }
    </style>
</head>
<body>

<div class="builder-card">
    <h2>fill-up CV</h2>
    <form action="vince.php" method="POST" enctype="multipart/form-data">
        
        <div class="grid-2">
            <div class="input-group"><label>Full Name</label><input type="text" name="fullName" required placeholder="Vince Cantago"></div>
            <div class="input-group"><label>Profession</label><input type="text" name="profession" required placeholder="IT Specialist"></div>
        </div>
        
        <div class="grid-2">
            <div class="input-group"><label>Email</label><input type="email" name="email" required placeholder="vince.cantago@evsu.edu.ph"></div>
            <div class="input-group"><label>Phone</label><input type="text" name="phone" required placeholder="09123456789"></div>
        </div>

        <div class="input-group"><label>Address</label><input type="text" name="address" required placeholder="Ormoc City, Leyte"></div>
        
        <div class="grid-2">
            <div class="input-group"><label>Skills</label><input type="text" name="skills" required placeholder="PHP, HTML, Design"></div>
            <div class="input-group">
                <label>Profile Picture</label>
                <div class="img-upload-container">
                    <input type="file" name="profilePic" id="profilePic" accept="image/*" required>
                    <img id="imagePreview" alt="Preview">
                </div>
            </div>
        </div>

        <div class="input-group"><label>Professional Summary</label><textarea name="summary" rows="3" required placeholder=">>>>>"></textarea></div>

        <hr>

        <div class="grid-2">
            <div class="input-group"><label>Job Title</label><input type="text" name="exp_title" required placeholder="EX: Web Dev if wala "None""></div>
            <div class="input-group"><label>Company</label><input type="text" name="exp_company" required placeholder="EX: Tech Corp if wala "None""></div>
        </div>
        <div class="grid-2">
            <div class="input-group"><label>Duration</label><input type="text" name="exp_duration" required placeholder="2022 - Present if wala "None""></div>
            <div class="input-group"><label>Job Description</label><textarea name="exp_desc" rows="2" required placeholder="if wala "None""></textarea></div>
        </div>

        <hr>

        <div class="grid-2">
            <div class="input-group"><label>Degree</label><input type="text" name="edu_degree" required placeholder="BS in Information Technology"></div>
            <div class="input-group"><label>School</label><input type="text" name="edu_school" required placeholder="Eastern Visayas State University"></div>
        </div>
        <div class="input-group"><label>Graduation Year</label><input type="text" name="edu_year" required placeholder="2026 if wla "None""></div>

        <button type="submit">Generate CV</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
